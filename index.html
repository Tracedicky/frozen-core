<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Frozen Core LCD Loop</title>
<style>
  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #020712;
  }
  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });

  let w = 480, h = 480, dpr = 1;
  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const snow = Array.from({length: 90}, () => ({
    x: Math.random(),
    y: Math.random(),
    z: 0.35 + Math.random() * 0.65,
    drift: -0.25 + Math.random() * 0.5,
    phase: Math.random() * Math.PI * 2
  }));

  const sparks = Array.from({length: 26}, () => ({
    a: Math.random() * Math.PI * 2,
    r: 0.18 + Math.random() * 0.19,
    s: 0.08 + Math.random() * 0.18,
    phase: Math.random() * Math.PI * 2
  }));

  function poly(points, fill, stroke, lw = 1) {
    ctx.beginPath();
    ctx.moveTo(points[0][0], points[0][1]);
    for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = lw; ctx.stroke(); }
  }

  function glowCircle(x, y, r, color, alpha = 1) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, color.replace('ALPHA', alpha));
    g.addColorStop(0.4, color.replace('ALPHA', alpha * 0.45));
    g.addColorStop(1, color.replace('ALPHA', 0));
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawRing(cx, cy, r, rot, alpha, width, dash) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#86dcff';
    ctx.lineWidth = width;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#64cfff';
    ctx.setLineDash(dash);
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    ctx.setLineDash([]);
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  function drawCrystal(cx, cy, s, t) {
    const pulse = 0.92 + 0.08 * Math.sin(t * 1.4);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.sin(t * 0.35) * 0.08);
    ctx.scale(pulse, pulse);

    glowCircle(0, 0, s * 1.05, 'rgba(82,201,255,ALPHA)', 0.38);

    const top = [0, -s * 0.72];
    const left = [-s * 0.42, -s * 0.08];
    const right = [s * 0.42, -s * 0.08];
    const bottom = [0, s * 0.72];
    const c1 = [-s * 0.12, -s * 0.06];
    const c2 = [s * 0.12, -s * 0.06];

    poly([top, left, c1], 'rgba(180,240,255,.92)', 'rgba(220,250,255,.8)', 1.5);
    poly([top, c1, c2], 'rgba(118,216,255,.95)', 'rgba(220,250,255,.8)', 1.5);
    poly([top, c2, right], 'rgba(224,252,255,.95)', 'rgba(220,250,255,.8)', 1.5);
    poly([left, bottom, c1], 'rgba(78,164,227,.88)', 'rgba(210,245,255,.75)', 1.2);
    poly([c1, bottom, c2], 'rgba(112,210,255,.92)', 'rgba(210,245,255,.75)', 1.2);
    poly([c2, bottom, right], 'rgba(170,236,255,.90)', 'rgba(210,245,255,.75)', 1.2);

    ctx.globalCompositeOperation = 'screen';
    const shine = ctx.createLinearGradient(-s * 0.35, -s * 0.4, s * 0.2, s * 0.3);
    shine.addColorStop(0, 'rgba(255,255,255,0)');
    shine.addColorStop(0.5, 'rgba(255,255,255,.65)');
    shine.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = shine;
    ctx.rotate(-0.18);
    ctx.fillRect(-s * 0.15 + Math.sin(t * 0.9) * s * 0.08, -s * 0.65, s * 0.16, s * 1.3);
    ctx.globalCompositeOperation = 'source-over';

    ctx.restore();
  }

  function drawLogo(cx, cy, s) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.globalAlpha = 0.9;
    ctx.fillStyle = '#ecfbff';
    ctx.shadowBlur = 8;
    ctx.shadowColor = '#8be0ff';

    // Simple sail-like Corsair-inspired mark (not an exact trademark reproduction)
    const blades = [
      [[-0.40,-0.05],[-0.08,-0.28],[-0.15,0.02]],
      [[-0.18,-0.06],[0.05,-0.36],[-0.02,0.02]],
      [[0.03,-0.07],[0.18,-0.32],[0.17,0.03]],
      [[0.18,-0.04],[0.34,-0.20],[0.31,0.04]],
    ];
    blades.forEach(b => poly(b.map(([x,y]) => [x*s,y*s]), '#ecfbff'));
    ctx.fillRect(-0.35*s, 0.07*s, 0.7*s, 0.08*s);
    ctx.restore();
    ctx.shadowBlur = 0;
  }

  function draw(tms) {
    const t = tms / 1000;
    const size = Math.min(w, h);
    const cx = w / 2, cy = h / 2;

    const bg = ctx.createRadialGradient(cx, cy, size * 0.02, cx, cy, size * 0.72);
    bg.addColorStop(0, '#11395b');
    bg.addColorStop(0.32, '#071a2e');
    bg.addColorStop(0.72, '#020914');
    bg.addColorStop(1, '#01050c');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // Aurora haze
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    ctx.globalAlpha = 0.22;
    for (let i = 0; i < 4; i++) {
      const y = cy + Math.sin(t * 0.25 + i) * size * 0.12 + (i - 1.5) * size * 0.08;
      const g = ctx.createLinearGradient(0, y - 35, 0, y + 35);
      g.addColorStop(0, 'rgba(40,130,255,0)');
      g.addColorStop(0.5, 'rgba(74,210,255,.5)');
      g.addColorStop(1, 'rgba(40,130,255,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, y - 45, w, 90);
    }
    ctx.restore();

    // Snow
    for (const p of snow) {
      p.y += 0.00045 * p.z;
      p.x += 0.00008 * p.drift + Math.sin(t * 0.7 + p.phase) * 0.00005;
      if (p.y > 1.03) { p.y = -0.03; p.x = Math.random(); }
      if (p.x < -0.03) p.x = 1.03;
      if (p.x > 1.03) p.x = -0.03;
      const x = p.x * w, y = p.y * h, r = (0.7 + p.z * 1.7) * size / 480;
      ctx.fillStyle = `rgba(225,248,255,${0.25 + p.z * 0.55})`;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    drawRing(cx, cy, size * 0.37,  t * 0.12, 0.38, 2.0, [size*0.07,size*0.025]);
    drawRing(cx, cy, size * 0.31, -t * 0.18, 0.55, 1.4, [size*0.025,size*0.018]);
    drawRing(cx, cy, size * 0.245, t * 0.28, 0.68, 1.2, [size*0.012,size*0.022]);

    // Orbiting sparks
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    for (const p of sparks) {
      const a = p.a + t * p.s;
      const r = p.r * size + Math.sin(t * 0.8 + p.phase) * size * 0.01;
      const x = cx + Math.cos(a) * r;
      const y = cy + Math.sin(a) * r;
      glowCircle(x, y, 5 + 4*Math.sin(t + p.phase), 'rgba(165,235,255,ALPHA)', 0.45);
    }
    ctx.restore();

    drawCrystal(cx, cy - size * 0.025, size * 0.19, t);
    drawLogo(cx, cy - size * 0.012, size * 0.12);

    // Edge frost vignette
    const vg = ctx.createRadialGradient(cx, cy, size * 0.34, cx, cy, size * 0.72);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(0.72, 'rgba(0,0,0,.06)');
    vg.addColorStop(1, 'rgba(0,5,12,.72)');
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, w, h);

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
