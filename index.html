<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Frozen Core V3</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100vw;height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const c = document.getElementById('c');
  const x = c.getContext('2d', { alpha:false });
  let W=480,H=480,D=1,last=0;
  const TAU=Math.PI*2, rnd=(a,b)=>a+Math.random()*(b-a);

  function resize(){
    D=Math.min(devicePixelRatio||1,2);
    W=innerWidth; H=innerHeight;
    c.width=Math.floor(W*D); c.height=Math.floor(H*D);
    x.setTransform(D,0,0,D,0,0);
  }
  addEventListener('resize',resize); resize();

  const stars=Array.from({length:70},()=>({x:Math.random(),y:Math.random(),z:rnd(.2,1),p:rnd(0,TAU)}));
  const snow=Array.from({length:110},()=>({x:Math.random(),y:Math.random(),z:rnd(.25,1),p:rnd(0,TAU),s:rnd(.015,.07)}));
  const arcs=Array.from({length:9},()=>({a:rnd(0,TAU),p:rnd(0,TAU),s:rnd(.2,.55)}));

  function glow(cx,cy,r,a){
    const g=x.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,`rgba(210,250,255,${a})`);
    g.addColorStop(.22,`rgba(95,220,255,${a*.7})`);
    g.addColorStop(.65,`rgba(25,120,255,${a*.22})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    x.fillStyle=g; x.beginPath(); x.arc(cx,cy,r,0,TAU); x.fill();
  }

  function ring(cx,cy,r,rot,count,span,alpha,width){
    x.save(); x.translate(cx,cy); x.rotate(rot);
    x.strokeStyle=`rgba(150,235,255,${alpha})`;
    x.lineWidth=width;
    x.shadowBlur=14; x.shadowColor='#69d9ff';
    for(let i=0;i<count;i++){
      const a=i*TAU/count;
      x.beginPath();
      x.arc(0,0,r,a,a+span);
      x.stroke();
    }
    x.restore(); x.shadowBlur=0;
  }

  function crystal(cx,cy,s,t,charge){
    x.save(); x.translate(cx,cy); x.rotate(Math.sin(t*.34)*.12 + t*.025);
    const bob=1+Math.sin(t*.9)*.025;
    x.scale(bob,bob);

    glow(0,0,s*1.55,.18+.24*charge);

    const top=[0,-s*.86], left=[-s*.48,-s*.12], right=[s*.48,-s*.12], bottom=[0,s*.9];
    const a=[-s*.17,-s*.06], b=[s*.17,-s*.06], m=[0,s*.26];

    function poly(p,fill,stroke='rgba(235,255,255,.72)'){
      x.beginPath(); x.moveTo(p[0][0],p[0][1]); for(let i=1;i<p.length;i++)x.lineTo(p[i][0],p[i][1]); x.closePath();
      x.fillStyle=fill; x.fill(); x.strokeStyle=stroke; x.lineWidth=1.2; x.stroke();
    }

    poly([top,left,a],'rgba(190,245,255,.92)');
    poly([top,a,b],'rgba(90,205,255,.96)');
    poly([top,b,right],'rgba(230,255,255,.95)');
    poly([left,bottom,m,a],'rgba(40,115,205,.9)');
    poly([a,m,b],'rgba(80,190,255,.96)');
    poly([b,m,bottom,right],'rgba(150,235,255,.92)');

    x.save();
    x.globalCompositeOperation='screen';
    const sweep=((t*.13)%1);
    const sx=(-.75+sweep*1.5)*s;
    const g=x.createLinearGradient(sx-s*.22,0,sx+s*.22,0);
    g.addColorStop(0,'rgba(255,255,255,0)');
    g.addColorStop(.5,`rgba(255,255,255,${.48+.28*charge})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    x.fillStyle=g; x.rotate(-.16); x.fillRect(sx-s*.12,-s,s*.24,s*2);
    x.restore();

    x.strokeStyle=`rgba(215,250,255,${.28+.3*charge})`;
    x.lineWidth=1;
    x.beginPath();
    x.moveTo(-s*.03,-s*.52); x.lineTo(s*.1,-s*.23); x.lineTo(-s*.02,s*.05); x.lineTo(s*.08,s*.38);
    x.moveTo(-s*.2,-s*.08); x.lineTo(-s*.06,s*.12); x.lineTo(-s*.18,s*.42);
    x.stroke();

    x.restore();
  }

  function electric(cx,cy,size,t,charge){
    if(charge<.35)return;
    x.save(); x.globalCompositeOperation='screen';
    x.strokeStyle=`rgba(170,245,255,${(charge-.35)*.8})`;
    x.lineWidth=1.2; x.shadowBlur=10; x.shadowColor='#8feaff';
    for(const e of arcs){
      const a=e.a+t*e.s;
      const r1=size*.12, r2=size*(.18+.02*Math.sin(t+e.p));
      const x1=cx+Math.cos(a)*r1, y1=cy+Math.sin(a)*r1;
      const x2=cx+Math.cos(a+.25*Math.sin(t*2+e.p))*r2, y2=cy+Math.sin(a+.25*Math.sin(t*2+e.p))*r2;
      x.beginPath(); x.moveTo(x1,y1);
      const mx=(x1+x2)/2+rnd(-5,5), my=(y1+y2)/2+rnd(-5,5);
      x.lineTo(mx,my); x.lineTo(x2,y2); x.stroke();
    }
    x.restore(); x.shadowBlur=0;
  }

  function fog(cx,cy,size,t){
    x.save(); x.globalCompositeOperation='screen'; x.globalAlpha=.18;
    for(let i=0;i<5;i++){
      const yy=cy-size*.18+i*size*.09+Math.sin(t*.18+i)*size*.025;
      const g=x.createLinearGradient(0,yy-size*.05,0,yy+size*.05);
      g.addColorStop(0,'rgba(0,0,0,0)');
      g.addColorStop(.5,'rgba(70,190,255,.35)');
      g.addColorStop(1,'rgba(0,0,0,0)');
      x.fillStyle=g; x.fillRect(0,yy-size*.06,W,size*.12);
    }
    x.restore();
  }

  function draw(ms){
    const t=ms/1000, dt=Math.min(.033,(ms-last)/1000||.016); last=ms;
    const S=Math.min(W,H), cx=W/2, cy=H/2;

    const cycle=(t%10)/10;
    let charge=0;
    if(cycle>.62 && cycle<.78) charge=(cycle-.62)/.16;
    else if(cycle>=.78 && cycle<.9) charge=1-(cycle-.78)/.12;
    charge=Math.max(0,Math.min(1,charge));

    const bg=x.createRadialGradient(cx,cy-S*.04,S*.02,cx,cy,S*.76);
    bg.addColorStop(0,'#0c2740'); bg.addColorStop(.34,'#03111f'); bg.addColorStop(.72,'#01050b'); bg.addColorStop(1,'#000');
    x.fillStyle=bg; x.fillRect(0,0,W,H);

    for(const p of stars){
      const tw=.25+.5*(.5+.5*Math.sin(t*.8+p.p));
      x.fillStyle=`rgba(180,235,255,${tw*p.z*.5})`;
      x.beginPath(); x.arc(p.x*W,p.y*H,.4+p.z*1.1,0,TAU); x.fill();
    }

    fog(cx,cy,S,t);

    for(const p of snow){
      const gust=1+charge*2.3;
      p.y+=dt*(.015+.05*p.z)*gust;
      p.x+=dt*(Math.sin(t*.6+p.p)*.004 + charge*.018);
      if(p.y>1.05){p.y=-.05;p.x=Math.random()}
      if(p.x>1.05)p.x=-.05;
      x.fillStyle=`rgba(235,250,255,${.18+p.z*.55})`;
      x.beginPath(); x.arc(p.x*W,p.y*H,.5+p.z*1.45,0,TAU); x.fill();
    }

    ring(cx,cy,S*.39,t*.045,6,.43,.22,1.8);
    ring(cx,cy,S*.325,-t*.085,10,.22,.38,1.4);
    ring(cx,cy,S*.265,t*.14,14,.12,.55,1.1);

    const pulse=.5+.5*Math.sin(t*1.15);
    glow(cx,cy,S*(.19+.018*charge),.12+.18*pulse+.25*charge);

    electric(cx,cy,S,t,charge);
    crystal(cx,cy-S*.008,S*.17,t,charge);

    if(charge>.02){
      x.save(); x.strokeStyle=`rgba(150,235,255,${charge*.35})`; x.lineWidth=2+4*charge;
      x.shadowBlur=22; x.shadowColor='#7fe7ff';
      x.beginPath(); x.arc(cx,cy,S*(.2+.14*charge),0,TAU); x.stroke(); x.restore();
    }

    const v=x.createRadialGradient(cx,cy,S*.33,cx,cy,S*.78);
    v.addColorStop(0,'rgba(0,0,0,0)');
    v.addColorStop(.72,'rgba(0,0,0,.08)');
    v.addColorStop(1,'rgba(0,0,0,.82)');
    x.fillStyle=v; x.fillRect(0,0,W,H);

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
